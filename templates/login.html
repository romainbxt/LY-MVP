{% extends "base.html" %}
{% block title %}LY - Connexion{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="logo-header">
        <h1>LY</h1>
        <p>Votre co-pilote fidélité</p>
    </div>

    <div class="card">
        <h2>Connexion</h2>
        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="francesca@moncafe.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
        </form>
    </div>

    <div class="auth-link">
        Pas encore de compte ? <a href="{{ url_for('register') }}">Créer mon commerce</a>
    </div>
</div>
{% endblock %}

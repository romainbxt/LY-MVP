{% extends "base.html" %}
{% block title %}LY - Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="logo-header">
        <h1>LY</h1>
        <p>Your loyalty co-pilot</p>
    </div>

    <div class="card">
        <h2>Login</h2>
        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="francesca@mycafe.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Log in</button>
        </form>
    </div>

    <div class="auth-link">
        No account yet? <a href="{{ url_for('register') }}">Create my shop</a>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Rejoindre {{ shop_name }}{% endblock %}

{% block content %}
<div class="mobile-container" style="margin-top:40px">
    <div class="logo-header" style="text-align:center; margin-bottom:30px">
        <h1 style="color: var(--primary); font-size:2rem">LY</h1>
        <p style="font-size:1.1rem; margin-top:8px">Bienvenue chez <strong>{{ shop_name }}</strong></p>
    </div>

    <div class="card">
        <h2>Créer ma carte de fidélité</h2>
        <form method="POST">
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" name="first_name" required placeholder="Marco">
            </div>
            <div class="form-group">
                <label>Numéro de téléphone</label>
                <input type="tel" name="phone" required placeholder="+49 170 1234567">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Obtenir ma carte</button>
        </form>
    </div>

    <p style="text-align:center; font-size:0.8rem; color:var(--text-light); margin-top:16px">
        En vous inscrivant, vous acceptez de recevoir des communications de {{ shop_name }}.
    </p>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}LY - Sign Up{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="logo-header">
        <h1>LY</h1>
        <p>Create your smart loyalty program</p>
    </div>

    <div class="card">
        <h2>Sign Up</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Your name</label>
                <input type="text" name="name" required placeholder="Francesca Rossi">
            </div>
            <div class="form-group">
                <label>Shop name</label>
                <input type="text" name="shop_name" required placeholder="Caf&eacute; Francesca">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="francesca@mycafe.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create my shop</button>
        </form>
    </div>

    <div class="auth-link">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </div>
</div>
{% endblock %}

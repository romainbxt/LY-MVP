{% extends "base.html" %}
{% block title %}LY - Inscription{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="logo-header">
        <h1>LY</h1>
        <p>Créez votre programme de fidélité intelligent</p>
    </div>

    <div class="card">
        <h2>Inscription</h2>
        <form method="POST">
            <div class="form-group">
                <label>Votre nom</label>
                <input type="text" name="name" required placeholder="Francesca Rossi">
            </div>
            <div class="form-group">
                <label>Nom du commerce</label>
                <input type="text" name="shop_name" required placeholder="Café Francesca">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="francesca@moncafe.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Créer mon commerce</button>
        </form>
    </div>

    <div class="auth-link">
        Déjà un compte ? <a href="{{ url_for('login') }}">Se connecter</a>
    </div>
</div>
{% endblock %}
